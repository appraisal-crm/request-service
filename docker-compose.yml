# docker compose up -d                        — infra only (local dev: service via `go run`)
# docker compose --profile app up -d --build  — infra + migrations + the service
name: appraisal

services:
  postgres:
    image: postgres:17-alpine
    container_name: appraisal-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appraisal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appraisal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appraisal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: appraisal-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-appraisal}
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-appraisal}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: appraisal-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB:-keycloak_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-appraisal}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-appraisal}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # no curl in the image — probe the management port via bash /dev/tcp
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"UP\"' <&3"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka:
    image: apache/kafka:4.0.0
    container_name: appraisal-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # INTERNAL — containers (kafka:9092), EXTERNAL — host (localhost:9094)
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # must not change while kafka_data exists
      CLUSTER_ID: q1Sh-9_ISia_zwGINzRvyQ
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:v1.1.0
    container_name: appraisal-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: appraisal
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy

  migrate:
    image: migrate/migrate:v4.18.3
    container_name: appraisal-request-migrate
    profiles: ["app"]
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://${POSTGRES_USER:-appraisal}:${POSTGRES_PASSWORD:-appraisal}@postgres:5432/request_db?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy

  request-service:
    build: .
    container_name: appraisal-request-service
    profiles: ["app"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-appraisal}:${POSTGRES_PASSWORD:-appraisal}@postgres:5432/request_db?sslmode=disable
      JWKS_URL: http://keycloak:8080/realms/appraisal/protocol/openid-connect/certs
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  # legacy names — existing data lives in them, do not rename
  postgres_data:
    name: infra_postgres_data
  redis_data:
    name: infra_redis_data
  kafka_data:
