# Owns request-service's data infra (Postgres + Redis) only.
# Shared Kafka/Keycloak live in ../infra — bring that up first.
#   docker compose up -d                        — data infra only (local dev: service via `go run`)
#   docker compose --profile app up -d --build  — infra + migrations + the service (needs ../infra up)
name: appraisal-request

services:
  postgres:
    image: postgres:17-alpine
    container_name: appraisal-request-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appraisal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appraisal}
      POSTGRES_DB: ${POSTGRES_DB:-request_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appraisal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: appraisal-request-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-appraisal}
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-appraisal}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.3
    container_name: appraisal-request-migrate
    profiles: ["app"]
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://${POSTGRES_USER:-appraisal}:${POSTGRES_PASSWORD:-appraisal}@postgres:5432/${POSTGRES_DB:-request_db}?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy

  request-service:
    build: .
    container_name: appraisal-request-service
    profiles: ["app"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-appraisal}:${POSTGRES_PASSWORD:-appraisal}@postgres:5432/${POSTGRES_DB:-request_db}?sslmode=disable
      JWKS_URL: http://keycloak:8080/realms/appraisal/protocol/openid-connect/certs
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      KAFKA_BROKERS: kafka:9092
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-1s}
    ports:
      - "8080:8080"
    # own project network (reaches postgres/redis) + shared bus (kafka/keycloak)
    networks:
      - default
      - appraisal_shared
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:

# Kafka/Keycloak reachability — created by ../infra/docker-compose.yml.
networks:
  appraisal_shared:
    external: true
